worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;

    # Upstream definitions
    upstream fx_system {
        server fx-system:8089;
    }

    upstream fx_trade {
        server fx-trade:8081;
    }

    upstream fx_risk {
        server fx-risk:8083;
    }

    upstream fx_clearing {
        server fx-clearing:8084;
    }

    upstream fx_crm {
        server fx-crm:8085;
    }

    upstream fx_report {
        server fx-report:8086;
    }

    upstream fx_quote {
        server fx-quote:8082;
    }

    upstream fx_risk_engine {
        server fx-risk-engine:8087;
    }

    upstream fx_mt_bridge {
        server fx-mt-bridge:8088;
    }

    upstream fx_fix_gateway {
        server fx-fix-gateway:8091;
    }

    # Map for service routing
    map $uri $service_backend {
        default fx_system;

        # System service (auth, users, roles, permissions, dict, tenant)
        ~^/api/v1/auth/        fx_system;
        ~^/api/v1/users/       fx_system;
        ~^/api/v1/roles/       fx_system;
        ~^/api/v1/menus/       fx_system;
        ~^/api/v1/dicts/       fx_system;
        ~^/api/v1/tenants/     fx_system;

        # Trade service (orders, positions, accounts, wallets, quotes, symbols)
        ~^/api/v1/orders/      fx_trade;
        ~^/api/v1/positions/   fx_trade;
        ~^/api/v1/accounts/    fx_trade;
        ~^/api/v1/wallets/     fx_trade;
        ~^/api/v1/symbols/     fx_trade;
        ~^/api/v1/quotes/      fx_trade;

        # Risk control service
        ~^/api/v1/risk/        fx_risk;

        # Clearing service
        ~^/api/v1/settlements/ fx_clearing;

        # CRM service (customers, IB, tickets, KYC)
        ~^/api/v1/customers/   fx_crm;
        ~^/api/v1/ib/          fx_crm;
        ~^/api/v1/tickets/     fx_crm;
        ~^/api/v1/kyc/         fx_crm;

        # Report service
        ~^/api/v1/reports/     fx_report;

        # Quote service (Go - market data)
        ~^/api/v1/market/      fx_quote;

        # Risk engine (Go)
        ~^/api/v1/risk-engine/ fx_risk_engine;

        # MT4/MT5 bridge (Go)
        ~^/api/v1/mt/          fx_mt_bridge;

        # FIX gateway (Go)
        ~^/api/v1/fix/         fx_fix_gateway;
    }

    server {
        listen 80;
        server_name _;

        # Health check for gateway itself
        location /gateway/health {
            access_log off;
            return 200 '{"status":"UP","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # Proxy all API requests
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://$service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Timeout settings
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # CORS headers
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Tenant-Id, X-Request-Id" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # WebSocket for real-time quotes
        location /socket.io/ {
            proxy_pass http://fx_trade;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400;
        }

        # WebSocket for quote streaming
        location /ws/ {
            proxy_pass http://fx_quote;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Swagger UI (fx-system)
        location /doc.html {
            proxy_pass http://fx_system;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /v3/api-docs {
            proxy_pass http://fx_system;
            proxy_set_header Host $host;
        }

        # Default backend
        location / {
            return 404 '{"error":"Not Found","message":"API endpoint not found"}';
            add_header Content-Type application/json;
        }
    }
}
